<div class="map-legend mb-3 d-flex flex-wrap gap-3 small">
  <span><span class="dot dot--free"></span> Disponible</span>
  <span><span class="dot dot--reserved"></span> Reservada</span>
  <span><span class="dot dot--occupied"></span> Ocupada</span>
  <span><span class="dot dot--disabled"></span> Inactiva</span>
</div>
<p class="text-muted small mb-3">
  Pulse una mesa activa para avanzar el ciclo: disponible → ocupada → reservada.
</p>
<div class="map-grid" role="list">
  @for (t of tables; track t.id) {
    <button
      type="button"
      class="map-card-wrap"
      [class.map-card-wrap--disabled]="!t.active"
      (click)="onCardClick(t)"
      [attr.aria-label]="'Mesa en ' + t.location + ', ' + t.capacity + ' personas, ' + statusLabel(t)">
      <div [class]="cardClass(t)" role="listitem">
        <div class="map-card__title">{{ t.location }}</div>
        <div class="map-card__meta">{{ t.capacity }} personas</div>
        <div class="map-card__badge">{{ statusLabel(t) }}</div>
        <div class="map-card__ref" [attr.title]="'Id: ' + t.id">Ref. {{ shortRef(t.id) }}</div>
      </div>
    </button>
  }
</div>
