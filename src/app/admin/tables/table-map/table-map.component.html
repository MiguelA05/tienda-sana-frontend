<div class="map-legend mb-3 d-flex flex-wrap gap-3 small">
  <span><span class="dot dot--free"></span> Disponible</span>
  <span><span class="dot dot--reserved"></span> Reservada</span>
  <span><span class="dot dot--occupied"></span> Ocupada</span>
  <span><span class="dot dot--disabled"></span> Inactiva</span>
</div>
<p class="text-muted small mb-3">
  Pulse una mesa activa para avanzar el ciclo de estado: disponible → ocupada → reservada.
</p>
<div class="map-grid" role="list">
  @for (t of tables; track t.id) {
    <button
      type="button"
      class="map-card-wrap"
      [class.map-card-wrap--disabled]="!t.active"
      (click)="onCardClick(t)"
      [attr.aria-label]="'Mesa ' + t.id + ', capacidad ' + t.capacity">
      <div [class]="cardClass(t)" role="listitem">
        <div class="map-card__id">Mesa {{ t.id }}</div>
        <div class="map-card__meta">{{ t.location }} · {{ t.capacity }} pax</div>
        <div class="map-card__state">{{ effective(t) }}</div>
        <div class="map-card__hint small">{{ statusLabel(t) }}</div>
      </div>
    </button>
  }
</div>
