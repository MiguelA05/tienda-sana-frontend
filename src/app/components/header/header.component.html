<!-- HTML del header mejorado -->
<div class="header-container" [class.header-transparent]="useTransparentHeader">
  <header class="main-header" [class.scrolled]="hasScrolled" [class.home-overlay]="useTransparentHeader">
    <!-- Logo y título -->
    <div class="brand">
      <a class="brand-link" (click)="goHome($event)">
        <i class="fa-solid fa-seedling brand-icon"></i>
        <span class="brand-text">{{ title }}</span>
      </a>
    </div>

    <!-- Botón de menú para pantallas pequeñas -->
    <button class="menu-toggle" (click)="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <!-- Navegación -->
    <nav class="main-nav" [ngClass]="{ 'open': isMenuOpen }">
      <ul class="nav-list">
        <li class="nav-item">
          <a class="nav-link"
            [ngClass]="{ 'active': activeNav === 'inicio' }"
            (click)="irAInicio()">Inicio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
            [ngClass]="{ 'active': activeNav === 'productos' }"
            (click)="mostrarProductos()">Productos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"
            [ngClass]="{ 'active': activeNav === 'reservas' }"
            (click)="mostrarReservas()">Reservas</a>
        </li>
        @if (isLogged && isAdmin) {
          <li class="nav-item">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active">Administración</a>
          </li>
        }
      </ul>
    </nav>

    <!-- Usuario / Login-Registro -->
    <div class="auth-container">
      @if(!isLogged) {
      <button type="button" routerLink="/login" class="btn-outline">
        <i class="fa-solid fa-sign-in-alt me-2" style="margin-right: 8px;"></i>Login
      </button>
      <button type="button" routerLink="/register" class="btn-primary">
        <i class="fa-solid fa-user-plus me-2" style="margin-right: 8px;"></i>Registro
      </button>
      } @else {
      <div class="user-dropdown" (click)="$event.stopPropagation()">
        <button
          type="button"
          class="user-button"
          id="userDropdown"
          (click)="toggleUserDropdown($event)"
          [attr.aria-expanded]="isUserDropdownOpen"
          aria-haspopup="true"
          aria-controls="userDropdownMenu">
          <div class="user-avatar">
            <i class="fa-solid fa-user"></i>
          </div>
          <span class="user-name">{{ nombreUsuario }}</span>
          <i class="fa-solid fa-chevron-down dropdown-icon"></i>
        </button>
        <ul
          id="userDropdownMenu"
          class="dropdown-menu"
          [class.show]="isUserDropdownOpen"
          role="menu"
          [attr.aria-hidden]="!isUserDropdownOpen">
          <li class="dropdown-item" role="none">
            <a routerLink="/info-usuario" role="menuitem" (click)="closeUserDropdown()">
              <i class="fa-solid fa-user-circle me-2" style="margin-right: 8px;"></i> Ver perfil
            </a>
          </li>
          @if (!isAdmin) {
          <li class="dropdown-divider"></li>
          <li class="dropdown-item" role="none">
            <a routerLink="/historial" role="menuitem" (click)="closeUserDropdown()">
              <i class="fa-solid fa-history me-2" style="margin-right: 8px;"></i> Historial
            </a>
          </li>
          }
          <li class="dropdown-divider"></li>
          <li class="dropdown-item" role="none">
            <a href="#" role="menuitem" (click)="logout(); closeUserDropdown(); $event.preventDefault()">
              <i class="fa-solid fa-sign-out-alt me-2" style="margin-right: 8px;"></i> Cerrar sesión
            </a>
          </li>
        </ul>
      </div>

      @if (!isAdmin) {
      <div class="cart-container">
        <button type="button" class="cart-button cart-button-cart" routerLink="/carrito" aria-label="Ir al carrito">
          <i class="fa-solid fa-shopping-cart"></i>
        </button>
        <button type="button" class="cart-button cart-button-reservas" routerLink="/gestor-reservas" aria-label="Ir al gestor de reservas">
          <i class="fa-solid fa-calendar-check"></i>
        </button>
      </div>
      }
      }
    </div>
  </header>
</div>
